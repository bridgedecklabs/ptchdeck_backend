services:
  - type: web
    name: ptchdeck-api
    runtime: docker
    plan: free
    envVars:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://ptchdeck.com
